<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sign Form</title>
<style>
body{margin:0;font-family:Arial;background:#0d3b52;}
.container{max-width:1200px;margin:0 auto;background:white;min-height:100vh;padding:20px;}
.pdf-page{background:white;padding:40px;margin:20px 0;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.sign-btn{background:#e94560;color:white;padding:15px 40px;border:none;border-radius:5px;font-size:16px;cursor:pointer;margin:20px 0;}
</style>
</head>
<body>
<div class="container">
  <div id="content"></div>
  <center><button class="sign-btn" onclick="sign()">SIGN DOCUMENT</button></center>
</div>

<script>
let state={formNumber:'',items:[]};

function render(){
  const html='<div class="pdf-page">'+renderPage1()+'</div><div class="pdf-page">'+renderPage2()+'</div>';
  document.getElementById('content').innerHTML=html;
}

function renderPage1(){
  const t=calcTotals();
  return `<h2>Form: ${state.formNumber}</h2><p>Items: ${state.items.length}</p><p>Total Impact: ${t.totalImpact}</p>`;
}

function renderPage2(){
  let rows='';
  state.items.forEach((it,i)=>{
    rows+=`<tr><td>${i+1}</td><td>${it.item_code}</td><td>${it.item_description}</td><td>${it.new_price}</td><td>${it.old_price}</td></tr>`;
  });
  return `<table><thead><tr><th>#</th><th>Code</th><th>Desc</th><th>New</th><th>Old</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function calcTotals(){
  return {totalImpact:state.items.reduce((s,it)=>s+(parseFloat(it.impact)||0),0)};
}

function sign(){
  alert('Signature feature coming');
}

// LOAD DATA
const form=new URLSearchParams(window.location.search).get('form');
console.log('Loading:',form);
if(form){
  fetch('https://tkei-psm-backend.onrender.com/api/forms/'+form)
    .then(r=>r.json())
    .then(d=>{
      console.log('Got:',d);
      if(d.success){
        state.formNumber=d.formNumber;
        state.items=d.items;
        render();
      }
    });
}
</script>
</body>
</html>
